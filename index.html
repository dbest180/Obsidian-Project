<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Codex: The Archive</title>
    <link rel="stylesheet" href="./assets/styles/main.css">

<body class="age-presence">
    <div id="neural-background"></div>
    
    <main id="chronicle-canvas">

        <section id="hero-section" class="hero-section">
            <img src="./assets/images/Obsidian.png" alt="Hero Image" class="hero-image">

        <section id="fragment-container">
            <!-- Data rendering target -->
            <article class="fragment focus">

                <p>Before the stone was carved, he calculated the movement of the stars through a mind that sees the world as mathematical patterns.</p>
            </article>
            <nav id="nexus-nav" class="nexus-nav"></nav>
        </section>
    </main>

    <script type="module" src="./scripts/main.js"></script>
